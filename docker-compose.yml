version: '3.8'

services:
  f1poolers:
    build: .
    container_name: f1poolers
    restart: unless-stopped
    ports:
      - "3080:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_ENV=production
      - MYSQL_HOST=host.docker.internal
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=f1pooler
      - MYSQL_USER=f1pooler
      - MYSQL_PASSWORD=f1pooler
